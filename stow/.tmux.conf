# tmux display things in 256 colors
set -g default-terminal "tmux-256color"

# change prefix to Ctrl-x
set -g prefix C-x

set -g allow-passthrough on

# don't exit from tmux when closing a session
set -g detach-on-destroy off

set-option -a terminal-features 'tmux-256color:RGB'
set-option -a terminal-overrides "tmux-256color:Tc"

# Let inner programs (e.g. nvim) write the system clipboard via OSC 52
set -g set-clipboard on
set -as terminal-features ',*:clipboard'

set-option -g focus-events on

# scroll history
set -g history-limit 100000

# show messages for 4 seconds instead
set -g display-time 4000

# automatically renumber tmux windows
set -g renumber-windows on

# Activity Monitoring
setw -g monitor-activity off
set -g visual-activity off

# Rather than constraining window size to the maximum size of any client
# connected to the *session*, constrain window size to the maximum size of any
# client connected to *that window*. Much more reasonable.
setw -g aggressive-resize on

# make delay shorter
set -sg escape-time 0

# make window/pane index start with 1
set -g base-index 1
setw -g pane-base-index 1

# don't rename windows automatically
set-window-option -g allow-rename off
set-window-option -g automatic-rename off

bind u command-prompt "select-pane -T '%%'"

######################
#### Key Bindings ####
######################

# reload config file
bind r source-file ~/.tmux.conf \; display "Config Reloaded!"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l
# bind-key -T copy-mode-vi 'C-Space' select-pane -t:.+

# pane movement shortcuts
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# Resize pane shortcuts
bind -r H resize-pane -L 10
bind -r J resize-pane -D 10
bind -r K resize-pane -U 10
bind -r L resize-pane -R 10

bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# open a 20%-width split on the right and run claude
bind C split-window -h -l 32% -c "#{pane_current_path}" "claude"

# synchronize all panes in a window
bind y setw synchronize-panes

# enable mouse support for switching panes/windows
set -g mouse on

# word separators
set -g word-separators " |{}()[]<>`='\"!@#$%^&*:;,?"

# set vi mode for copy mode
setw -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

# more settings to make copy-mode more vim-like
unbind [
bind Escape copy-mode
unbind p
bind p paste-buffer
# bind -T copy-mode-vi v send -X begin-selection

unbind -T copy-mode-vi MouseDragEnd1Pane


# Clipboard integration via OSC 52 (works locally and over SSH)
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel
bind C-c run "tmux save-buffer -"

# Middle click to paste from the tmux buffer
unbind-key MouseDown2Pane
bind-key -n MouseDown2Pane paste-buffer

# Drag to re-order windows
bind-key -n MouseDrag1Status swap-window -t=

source ~/.dotfiles/tmux/base16.sh

setenv -g TMUX_PLUGIN_MANAGER_PATH "${HOME}/.tmux/plugins"

# create tmux plugins folder if it doesn't exist
if "test ! -d $TMUX_PLUGIN_MANAGER_PATH" \
    "run 'mkdir -p $TMUX_PLUGIN_MANAGER_PATH'"

if "test ! -d $TMUX_PLUGIN_MANAGER_PATH/tpm" \
    "run 'git clone https://github.com/tmux-plugins/tpm $TMUX_PLUGIN_MANAGER_PATH/tpm && $TMUX_PLUGIN_MANAGER_PATH/tpm/bin/install_plugins'"

# tmux plug manager
# list of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect' # restore tmux session after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically save the sessions every 15 min

set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'xamut/tmux-weather'
set -g @plugin 'omerxx/tmux-floax'

# status bar position
set -g status-position top
set -g status-style "bg=#{@thm_bg}"
set -g status-justify "absolute-centre"


# Configure Catppuccin
set -g @plugin 'catppuccin/tmux#v2.1.2'
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "off"

# Configure Online
set -g @online_icon "ok"
set -g @offline_icon "nok"

# status left look and feel
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_bg},bold]  #S },#{#[bg=#{@thm_bg},fg=#{@thm_green}]  #S }}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_maroon}]  #{pane_current_command} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_blue}]  #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]#{?window_zoomed_flag,│,}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_yellow}]#{?window_zoomed_flag,  Z ,}"

# pane border look and feel
setw -g pane-border-status top
setw -g pane-border-format ""
setw -g pane-active-border-style "bg=#{@thm_bg},fg=#{@thm_overlay_0}"
setw -g pane-border-style "bg=#{@thm_bg},fg=#{@thm_surface_0}"
setw -g pane-border-lines single

set -g window-status-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-style "bg=#{@thm_bg},fg=#{@thm_overlay_1}"
set -g window-status-last-style "bg=#{@thm_bg},fg=#{@thm_peach}"
set -g window-status-activity-style "bg=#{@thm_red},fg=#{@thm_bg}"
set -g window-status-bell-style "bg=#{@thm_red},fg=#{@thm_bg},bold"
set -gF window-status-separator "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}]│"

set -g window-status-current-format " #I#{?#{!=:#{window_name},Window},: #W,}#{?window_zoomed_flag, 󰊓,} "
set -g window-status-current-style "bg=#{@thm_peach},fg=#{@thm_bg},bold"

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# fix the error "return 1" (macOS-only: Homebrew path)
if-shell '[ "$(uname -s)" = "Darwin" ]' \
    'set-environment -g PATH "$PATH:/opt/homebrew/bin"'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '$TMUX_PLUGIN_MANAGER_PATH/tpm/tpm'

